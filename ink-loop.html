<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tender — Ink & Mood Loop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Playfair Display', Georgia, serif;
    color: #f5f0eb;
  }

  .canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Ink layers — organic shapes with SVG turbulence */
  .ink-layer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    filter: blur(80px);
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 2s ease, background-color 3s ease;
  }

  .ink-1 {
    width: 120%;
    height: 80%;
    animation: ink-drift-1 12s ease-in-out infinite;
  }

  .ink-2 {
    width: 80%;
    height: 120%;
    animation: ink-drift-2 15s ease-in-out infinite;
  }

  .ink-3 {
    width: 60%;
    height: 60%;
    filter: blur(60px);
    animation: ink-drift-3 10s ease-in-out infinite;
  }

  @keyframes ink-drift-1 {
    0%, 100% { transform: translate(-50%, -50%) scale(0.8) rotate(0deg); }
    25% { transform: translate(-45%, -55%) scale(1.1) rotate(5deg); }
    50% { transform: translate(-55%, -45%) scale(0.9) rotate(-3deg); }
    75% { transform: translate(-48%, -52%) scale(1.05) rotate(2deg); }
  }

  @keyframes ink-drift-2 {
    0%, 100% { transform: translate(-50%, -50%) scale(0.9) rotate(0deg); }
    33% { transform: translate(-55%, -48%) scale(1.05) rotate(-4deg); }
    66% { transform: translate(-45%, -53%) scale(0.85) rotate(6deg); }
  }

  @keyframes ink-drift-3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    50% { transform: translate(-52%, -48%) scale(1.2) rotate(-5deg); }
  }

  /* Grain overlay */
  .grain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.04;
    pointer-events: none;
    z-index: 10;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Text layers */
  .text-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
  }

  /* Dark halo behind text for contrast */
  .text-layer::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%;
    height: 40%;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(30px);
  }

  .title-text {
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.3;
    text-align: center;
    opacity: 0;
    filter: blur(8px);
    transition: opacity 1.8s ease, filter 1.8s ease, transform 1.8s ease;
    transform: translateY(8px);
    max-width: 80%;
    color: #ffffff;
    text-shadow: 0 0 40px rgba(0,0,0,0.9), 0 2px 20px rgba(0,0,0,0.7);
  }

  .title-text.visible {
    opacity: 1;
    filter: blur(0);
    transform: translateY(0);
  }

  .title-text.dissolving {
    opacity: 0;
    filter: blur(12px);
    transform: translateY(-8px);
  }

  .source-text {
    font-size: 0.85rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.02em;
    opacity: 0;
    filter: blur(4px);
    transition: opacity 1.5s ease 0.3s, filter 1.5s ease 0.3s, transform 1.5s ease 0.3s;
    transform: translateY(6px);
    margin-top: 0.75rem;
    color: rgba(255, 255, 255, 0.6);
    text-shadow: 0 0 30px rgba(0,0,0,0.7);
  }

  .source-text.visible {
    opacity: 1;
    filter: blur(0);
    transform: translateY(0);
  }

  .source-text.dissolving {
    opacity: 0;
    filter: blur(8px);
    transform: translateY(-6px);
    transition-delay: 0s;
  }

  .format-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    opacity: 0;
    transition: opacity 1.2s ease 0.1s, filter 1.2s ease 0.1s;
    filter: blur(4px);
    margin-bottom: 1rem;
  }

  .format-label.visible {
    opacity: 0.6;
    filter: blur(0);
  }

  .format-label.dissolving {
    opacity: 0;
    filter: blur(6px);
    transition-delay: 0s;
  }

  /* Tender wordmark — bottom */
  .wordmark {
    position: fixed;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: rgba(245, 240, 235, 0.35);
    z-index: 5;
    text-shadow: 0 0 30px rgba(0,0,0,0.5);
  }

  /* Tagline — appears between titles */
  .tagline {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.35rem;
    font-style: italic;
    color: rgba(245, 240, 235, 0.45);
    z-index: 5;
    opacity: 0;
    filter: blur(4px);
    transition: opacity 2s ease, filter 2s ease;
    white-space: nowrap;
  }

  .tagline.visible {
    opacity: 1;
    filter: blur(0);
  }

  /* Vignette */
  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10,10,10,0.7) 100%);
    z-index: 4;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="ink-layer ink-1" id="ink1"></div>
  <div class="ink-layer ink-2" id="ink2"></div>
  <div class="ink-layer ink-3" id="ink3"></div>
</div>

<div class="vignette"></div>
<div class="grain"></div>

<div class="text-layer">
  <div class="format-label" id="format"></div>
  <div class="title-text" id="title"></div>
  <div class="source-text" id="source"></div>
</div>

<div class="tagline" id="tagline">Feel something. Find something.</div>
<div class="wordmark">Tender</div>

<script>
const MOODS = [
  { color: '#3D8B6E', label: 'Anxious' },
  { color: '#5B7DB8', label: 'Sad' },
  { color: '#C43C4C', label: 'Angry' },
  { color: '#8B6BB5', label: 'Lost' },
  { color: '#E8962B', label: 'Restless' },
  { color: '#6E7B8B', label: 'Stuck' },
  { color: '#A78BBE', label: 'Lonely' },
  { color: '#2DB3A6', label: 'Curious' },
  { color: '#B87333', label: 'Cozy' },
  { color: '#E6C84D', label: 'Hopeful' },
  { color: '#B5838D', label: 'Bored' },
];

const TITLES = [
  { format: 'Poem', title: 'The Peace of Wild Things', source: 'Wendell Berry', mood: 0 },
  { format: 'Film', title: 'Aftersun', source: 'Charlotte Wells, 2022', mood: 1 },
  { format: 'Essay', title: 'A Letter to My Nephew', source: 'James Baldwin', mood: 2 },
  { format: 'Myth', title: 'The Labyrinth of Crete', source: 'Greek mythology', mood: 3 },
  { format: 'Song', title: 'Boredom', source: 'Tyler, the Creator', mood: 4 },
  { format: 'Book', title: 'When Things Fall Apart', source: 'Pema Chödrön', mood: 5 },
  { format: 'Podcast', title: 'The Heart', source: 'Radiotopia', mood: 6 },
  { format: 'Essay', title: 'Consider the Lobster', source: 'David Foster Wallace', mood: 7 },
  { format: 'Film', title: 'The Holiday', source: 'Nancy Meyers, 2006', mood: 8 },
  { format: 'Speech', title: 'This Is Water', source: 'David Foster Wallace', mood: 9 },
  { format: 'Short Story', title: 'Cathedral', source: 'Raymond Carver', mood: 6 },
  { format: 'Poem', title: 'The Conditional', source: 'Ada Limón', mood: 1 },
  { format: 'Film', title: 'Paterson', source: 'Jim Jarmusch, 2016', mood: 0 },
  { format: 'Myth', title: 'Orpheus and Eurydice', source: 'Greek mythology', mood: 1 },
  { format: 'Song', title: 'Re: Stacks', source: 'Bon Iver', mood: 1 },
  { format: 'Film', title: 'Stalker', source: 'Andrei Tarkovsky, 1979', mood: 10 },
  { format: 'Essay', title: 'In Praise of Boredom', source: 'Joseph Brodsky', mood: 10 },
];

const ink1 = document.getElementById('ink1');
const ink2 = document.getElementById('ink2');
const ink3 = document.getElementById('ink3');
const titleEl = document.getElementById('title');
const sourceEl = document.getElementById('source');
const formatEl = document.getElementById('format');
const taglineEl = document.getElementById('tagline');

let currentIndex = 0;
let showTagline = false;

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function setInkColor(mood) {
  const color = mood.color;
  ink1.style.backgroundColor = color;
  ink1.style.opacity = '0.25';
  ink2.style.backgroundColor = color;
  ink2.style.opacity = '0.15';
  ink3.style.backgroundColor = color;
  ink3.style.opacity = '0.35';
}

function showTitle(item) {
  const mood = MOODS[item.mood];

  // Set ink colors
  setInkColor(mood);

  // Set text
  formatEl.textContent = item.format;
  titleEl.textContent = item.title;
  sourceEl.textContent = item.source;

  // Reveal
  requestAnimationFrame(() => {
    formatEl.classList.add('visible');
    titleEl.classList.add('visible');
    sourceEl.classList.add('visible');
  });
}

function hideTitle() {
  formatEl.classList.add('dissolving');
  titleEl.classList.add('dissolving');
  sourceEl.classList.add('dissolving');
  formatEl.classList.remove('visible');
  titleEl.classList.remove('visible');
  sourceEl.classList.remove('visible');
}

function resetTitle() {
  formatEl.classList.remove('dissolving');
  titleEl.classList.remove('dissolving');
  sourceEl.classList.remove('dissolving');
}

function cycle() {
  if (showTagline) {
    // Show tagline between some titles
    taglineEl.classList.add('visible');

    setTimeout(() => {
      taglineEl.classList.remove('visible');
      setTimeout(() => {
        showTagline = false;
        cycle();
      }, 1500);
    }, 3000);
    return;
  }

  const item = TITLES[currentIndex];

  resetTitle();

  setTimeout(() => {
    showTitle(item);

    // Hold for 3.5s then dissolve
    setTimeout(() => {
      hideTitle();

      // Wait for dissolve, then next
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % TITLES.length;
        // Show tagline every 4 titles
        if (currentIndex % 4 === 0 && currentIndex > 0) {
          showTagline = true;
        }
        cycle();
      }, 2000);
    }, 3500);
  }, 300);
}

// Start with a fade in
setTimeout(() => {
  // Initial ink
  setInkColor(MOODS[TITLES[0].mood]);
  setTimeout(cycle, 1000);
}, 500);
</script>

</body>
</html>
